<h2 mat-dialog-title>{{ data.title }}</h2>
<div mat-dialog-content>
  <p>{{ data.message }}</p>
</div>
<div mat-dialog-actions align="end">
  <button mat-button color="primary" (click)="confirm()" [attr.aria-label]="data.confirmText">{{ data.confirmText }}</button>
  <button mat-button color="warn" (click)="cancel()" [attr.aria-label]="data.cancelText">{{ data.cancelText }}</button>
</div>
